name: Daily Briefing Email

# Disparos: 6 horarios BRT (seg-sex) + manual via workflow_dispatch.
# UTC = BRT + 3h (Brasil nao tem mais horario de verao).
on:
  schedule:
    - cron: '0 23 * * 1-5'  # 20h BRT (fechamento do dia)
    - cron: '0 7 * * 1-5'   # 4h BRT
    - cron: '0 8 * * 1-5'   # 5h BRT
    - cron: '0 9 * * 1-5'   # 6h BRT
    - cron: '0 10 * * 1-5'  # 7h BRT
    - cron: '0 11 * * 1-5'  # 8h BRT
  workflow_dispatch:
    inputs:
      test_hour:
        description: 'Hora BRT (0-23) para simular. Ex: 6. Deixe vazio para usar a hora atual.'
        required: false
        type: string

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install supabase yfinance pandas numpy requests pytz beautifulsoup4

      - name: Send daily briefing
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST:            ${{ secrets.SMTP_HOST }}
          SMTP_PORT:            ${{ secrets.SMTP_PORT }}
          SMTP_USER:            ${{ secrets.SMTP_USER }}
          SMTP_PASS:            ${{ secrets.SMTP_PASS }}
          SMTP_FROM:            ${{ secrets.SMTP_FROM }}
          TEST_HOUR:            ${{ inputs.test_hour }}
        run: python send_daily_briefing.py
