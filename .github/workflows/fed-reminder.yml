name: Fed Funds Reminder

# Roda uma vez por dia as 10h UTC = 07h BRT.
# FOMC decide tipicamente ~15h ET (18h BRT), entao o "dia seguinte" em BRT
# ja e o dia D+1 da reuniao. Scripts verifica se ontem foi reuniao e notifica.
on:
  schedule:
    - cron: '0 10 * * *'   # 07h BRT diario
  workflow_dispatch:
    inputs:
      force:
        description: 'Enviar lembrete agora (pega ultima reuniao do calendario)'
        required: false
        type: boolean
        default: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Send reminder if yesterday was FOMC
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASS:     ${{ secrets.SMTP_PASS }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
          NOTIFY_EMAIL:  ${{ secrets.SMTP_USER }}
          FORCE_RUN:     ${{ inputs.force && '1' || '' }}
        run: python check_fed_reminder.py
